name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Update Rust
        run: rustup update stable

      - name: Test
        run: cargo test --locked

  build:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: vmp-linux-x86_64.tar.gz
          - os: macos-latest
            asset: vmp-darwin-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Update Rust
        run: rustup update stable

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: tar -czf "${{ matrix.asset }}" -C target/release vmp

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/*.tar.gz --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "Release $TAG"
